{% if warning_message is defined and warning_message %}
<div role="alert" class="option-warning">{{ warning_message }}</div>
{% endif %}
{% for opt in options %}
{% include "partials/option_card.html" %}
{% endfor %}
{% if options|length < 4 %}
<button
  type="button"
  hx-post="/partials/option/add"
  hx-target="#options-container"
  hx-swap="innerHTML"
  hx-include="#comparison-form"
>+ Add Financing Option</button>
{% endif %}
