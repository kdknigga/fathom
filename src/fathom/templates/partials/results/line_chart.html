<section class="chart-section" aria-label="Line chart comparison">
  <h3>Cumulative Cost Over Time</h3>
  <svg role="img" aria-labelledby="line-chart-title line-chart-desc"
       xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 {{ charts.line.width }} {{ charts.line.height }}"
       class="chart-line">
    <title id="line-chart-title">Cumulative Cost Over Time</title>
    <desc id="line-chart-desc">Line chart showing month-by-month cumulative cost for {{ charts.line.lines|length }} financing options over {{ charts.line.max_months }} months.</desc>

    {# Grid lines - horizontal (Y-axis) #}
    {% for label in charts.line.y_labels %}
    <line x1="60" y1="{{ label.y }}" x2="{{ charts.line.width - 30 }}" y2="{{ label.y }}"
          stroke="var(--chart-grid)" stroke-width="0.5"/>
    <text x="55" y="{{ label.y + 4 }}" text-anchor="end" font-size="11" fill="var(--chart-label)">${{ label.value }}</text>
    {% endfor %}

    {# Grid lines - vertical (X-axis at year boundaries) #}
    {% for label in charts.line.x_labels %}
    <line x1="{{ label.x }}" y1="60" x2="{{ label.x }}" y2="{{ charts.line.height - 60 }}"
          stroke="var(--chart-grid)" stroke-width="0.5"/>
    <text x="{{ label.x }}" y="{{ charts.line.height - 40 }}" text-anchor="middle" font-size="11" fill="var(--chart-label)">{{ label.label }}</text>
    {% endfor %}

    {# Cost lines for each option #}
    {% for line in charts.line.lines %}
    <path d="{{ line.path_d }}"
          fill="none" stroke="var(--chart-series-{{ loop.index0 }})" stroke-width="2.5"
          stroke-dasharray="{{ line.dash_pattern }}" stroke-linecap="round"/>

    {# Endpoint label #}
    <text x="{{ line.end_x + 5 }}" y="{{ line.end_y }}"
          font-size="11" font-weight="bold" fill="var(--chart-series-{{ loop.index0 }})">{{ line.name }}: ${{ line.end_value }}</text>
    {% endfor %}
  </svg>

  {% include "partials/results/data_table_line.html" %}
</section>
