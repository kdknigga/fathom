<section class="chart-section" aria-label="Bar chart comparison">
  <h3>True Total Cost Comparison</h3>
  <svg role="img" aria-labelledby="bar-chart-title bar-chart-desc"
       xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 {{ charts.bar.width }} {{ charts.bar.height }}"
       class="chart-bar">
    <title id="bar-chart-title">True Total Cost Comparison</title>
    <desc id="bar-chart-desc">Bar chart comparing true total cost of {{ charts.bar.bars|length }} financing options. {{ charts.bar.winner_name }} has the lowest cost.</desc>

    <defs>
      <pattern id="bar-pattern-solid" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="currentColor"/>
      </pattern>
      <pattern id="bar-pattern-hatched" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="10" height="10" fill="white"/>
        <line x1="0" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="3"/>
      </pattern>
      <pattern id="bar-pattern-dotted" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="white"/>
        <circle cx="5" cy="5" r="2.5" fill="currentColor"/>
      </pattern>
      <pattern id="bar-pattern-crosshatch" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="white"/>
        <path d="M0,0 L10,10 M10,0 L0,10" stroke="currentColor" stroke-width="1.5"/>
      </pattern>
    </defs>

    {# Y-axis baseline #}
    <line x1="{{ charts.bar.bars[0].x - 10 if charts.bar.bars else 50 }}" y1="{{ charts.bar.axis_y }}"
          x2="{{ charts.bar.width - 30 }}" y2="{{ charts.bar.axis_y }}"
          stroke="#e5e7eb" stroke-width="1"/>

    {% for bar in charts.bar.bars %}
    {# Bar rectangle with pattern fill #}
    <g style="color: {{ bar.color }}">
      <rect x="{{ bar.x }}" y="{{ bar.y }}"
            width="{{ bar.width }}" height="{{ bar.height }}"
            fill="url(#{{ bar.pattern_id }})"
            stroke="{{ bar.color }}" stroke-width="2"
            {% if bar.is_winner %}class="winner-bar"{% endif %}
            role="presentation"/>
    </g>

    {# Value label above bar #}
    <text x="{{ bar.value_x }}" y="{{ bar.value_y }}"
          text-anchor="middle" font-size="13" font-weight="bold"
          fill="{{ bar.color }}">${{ bar.value }}</text>

    {# Option name below bar #}
    <text x="{{ bar.label_x }}" y="{{ bar.label_y }}"
          text-anchor="middle" font-size="12"
          fill="#374151">{{ bar.label }}{% if bar.is_winner %} &#9733;{% endif %}</text>
    {% endfor %}
  </svg>

  {% include "partials/results/data_table_bar.html" %}
</section>
